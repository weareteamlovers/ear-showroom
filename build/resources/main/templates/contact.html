<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts | Teamlovers</title>
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main style="width:min(100%,960px);margin:0 auto;padding:56px 20px;">
  <h1>Contacts</h1>

  <div style="margin-top:24px;display:grid;gap:16px;">
    <div style="padding:24px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);">
      <p style="margin:0 0 8px;color:var(--muted);">Email</p>
      <a href="mailto:teamlovers@icloud.com">teamlovers@icloud.com</a>
    </div>

    <div style="padding:24px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);">
      <p style="margin:0 0 8px;color:var(--muted);">GitHub</p>
      <a href="https://github.com/weareteamlovers" target="_blank" rel="noopener noreferrer">
        github.com/weareteamlovers
      </a>
    </div>
  </div>
</main>
</body>
</html>
